services:
  - type: web
    name: cloud-expense-tracker-api
    runtime: node
    plan: free
    buildCommand: |
      npm install
      npx prisma generate --schema=prisma/schema.postgresql.prisma
      npx prisma migrate deploy --schema=prisma/schema.postgresql.prisma
      npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
